  <rect width="640" height="800" fill="url(#bg)"/>
  <circle cx="320" cy="300" r="120" fill="none" stroke="url(#txt)" stroke-width="3" opacity="0.5"/>
  <text x="50%" y="300" text-anchor="middle" dominant-baseline="central"
